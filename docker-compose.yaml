services:

  web:
    build:
      context: ./
      dockerfile: web.Dockerfile
    volumes:
      - .:/app
    ports:
      - "8081:8000"

    entrypoint: "./entrypoint_web.sh"
    environment:
      # Local dev only. Production (Railway) leaves DEBUG off and sets
      # DJANGO_SECRET_KEY in the dashboard — see .env.example.
      DJANGO_DEBUG: "1"
