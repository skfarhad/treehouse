{% extends 'website/base.html' %}

{% block title %}
    <title>Projects</title>
{% endblock title %}

{% block content %}
    <main id="main">
        <div class="container">
            <div id="recent-works" class="row section recentworks topspace">
                <h2 class="section-title"><span>Projects</span></h2>
                <div class="thumbnails recentworks row">
                    {% for work in context.projects %}

                    <div class="col-xs-12 col-sm-6 col-md-4 col-lg-4">
                        <a class="thumbnail" href="{{ work.url }}">
                            <span class="img">
                                <img src="{{ work.image_url }}" alt="{{ work.title }}">
                                <span class="cover"><span class="more">See details &rarr;</span></span>
                            </span>
                            <span class="title">{{ work.title }}</span>
                        </a>
                    </div>

                    {% endfor %}
                </div>
            </div> <!-- /section -->
        </div>	<!-- /container -->
    </main>
{% endblock content %}
