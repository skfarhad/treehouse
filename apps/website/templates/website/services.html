{% extends 'website/base.html' %}

{% block title %}
    <title>Services</title>
{% endblock title %}

{% block content %}
    <main id="main">
        <div class="container">
            <div id="services" class="row section featured topspace">
                <h2 class="section-title"><span>Services</span></h2>
                <style>
                    #services .service-card {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        height: 100%;
                        padding: 28px 20px;
                        margin-bottom: 20px;
                        border: 1px solid #ececec;
                        border-radius: 6px;
                        text-align: center;
                        transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
                    }
                    #services .service-card:hover {
                        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
                        border-color: #f6c8da;
                        transform: translateY(-3px);
                    }
                    #services .service-icon {
                        flex: 0 0 64px;
                        width: 64px;
                        height: 64px;
                        border-radius: 50%;
                        background: #fdeaf0;
                        color: #bd1550;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 26px;
                        margin-bottom: 16px;
                    }
                    #services .service-card h3 {
                        margin-top: 0;
                    }
                    #services .service-card p {
                        flex: 1 1 auto;
                    }
                </style>
                <div class="row">
                    {% for service in context.services %}

                    <div class="col-sm-6 col-md-4">
                        <div class="service-card">
                            <span class="service-icon"><i class="{{ service.icon }}"></i></span>
                            <h3>{{ service.title }}</h3>
                            <p>{{ service.description }}</p>
                            <p>
                                <a href="{{ service.url }}" class="read-more">Read more &rarr;</a>
                            </p>
                        </div>
                    </div>

                    {% endfor %}
                </div>
            </div> <!-- / section -->
        </div>	<!-- /container -->
    </main>
{% endblock content %}
