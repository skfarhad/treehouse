{% extends 'website/base.html' %}

{% block title %}
    <title>Services</title>
{% endblock title %}

{% block content %}
    <main id="main">
        <div class="container">
            <div id="services" class="row section featured topspace">
                <h2 class="section-title"><span>Services</span></h2>
                <div class="row">
                    {% for service in context.services %}

                    <div class="col-sm-6 col-md-4">
                        <h3 class="text-center">{{ service.title }}</h3>
                        <p>{{ service.description }}</p>
                        <p class="text-center">
                            <a href="{{ service.url }}" class="read-more">Read more &rarr;</a>
                        </p>
                    </div>

                    {% endfor %}
                </div>
            </div> <!-- / section -->
        </div>	<!-- /container -->
    </main>
{% endblock content %}
